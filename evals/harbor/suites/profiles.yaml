# Harbor job config: bounded optimization-profile matrix (#298) — the same
# tasks and plain-claude baseline, plus one agentify agent per routing profile
# (cost, balanced, performance). Identical image, model, verifier, and
# repetitions per arm; the import maps each profile to its own arm label
# (agentify-cost, agentify, agentify-performance) so `agentify eval report`
# shows the cross-profile pass-rate / cost-per-pass / latency frontier.
# Launch from evals/harbor/ with:  harbor run -c suites/profiles.yaml
jobs_dir: jobs

n_attempts: 3

dataset:
  path: tasks

agents:
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: cost
      max_budget_usd: 0.35
      max_turns: 12
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: balanced
      max_budget_usd: 0.35
      max_turns: 12
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: performance
      max_budget_usd: 0.35
      max_turns: 12
  - name: claude-code
    model_name: anthropic/claude-haiku-4-5-20251001
