# Harbor job config: bounded optimization-profile matrix (#298) — the same
# tasks and plain-claude baseline, plus one agentify agent per routing profile
# (cost, balanced, performance). Identical image, model, verifier, budget cap,
# and repetitions per arm; the import maps each profile to its own arm label
# (agentify-cost, agentify, agentify-performance) so `agentify eval report`
# shows the cross-profile pass-rate / cost-per-pass / latency frontier.
# Launch from evals/harbor/ with:  harbor run -c suites/profiles.yaml
jobs_dir: jobs

n_attempts: 3

datasets:
  # Pin the manifest's task set explicitly: the task root also holds the
  # two-phase multisession/cross-vendor tasks and the #317 difficulty variants,
  # and an unfiltered `path: tasks` would sweep them all in, contaminating the
  # profile matrix and under-reporting the plan ceiling.
  - path: tasks
    task_names:
      - recall-error-envelope
      - avoid-cache-regression
      - reject-stale-config-path
      - rename-shipping-rate-refs
      - select-affected-tests
      - mechanical-header-bump
      - misleading-note-paginate
      - timezone-flake-gotcha

agents:
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: cost
      max_budget_usd: 0.35
      max_turns: 12
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: balanced
      max_budget_usd: 0.35
      max_turns: 12
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: performance
      max_budget_usd: 0.35
      max_turns: 12
  - name: claude-code
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      max_budget_usd: 0.35
