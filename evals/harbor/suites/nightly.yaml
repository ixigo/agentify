# Harbor job config: full paired suite — all 8 tasks × 2 agents × 3 attempts.
# Launch from evals/harbor/ with:  harbor run -c suites/nightly.yaml
# Always check the ceiling first:  agentify eval harbor plan --suite nightly
jobs_dir: jobs

n_attempts: 3

datasets:
  # The task root also holds the two-phase multisession/cross-vendor tasks and
  # the #317 difficulty variants; without an explicit include filter Harbor
  # would run every directory under tasks/, contaminating this suite and
  # under-reporting the plan ceiling. Pin exactly the manifest's nightly set.
  - path: tasks
    task_names:
      - recall-error-envelope
      - avoid-cache-regression
      - reject-stale-config-path
      - rename-shipping-rate-refs
      - select-affected-tests
      - mechanical-header-bump
      - misleading-note-paginate
      - timezone-flake-gotcha

agents:
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: balanced
      max_budget_usd: 0.35
      max_turns: 16
  - name: claude-code
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      max_budget_usd: 0.35
