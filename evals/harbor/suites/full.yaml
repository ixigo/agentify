# Harbor job config: complete context-decisive task bank.
# Launch from evals/harbor/ with: harbor run -c suites/full.yaml
jobs_dir: jobs

n_attempts: 3
n_concurrent_trials: 2

datasets:
  - path: tasks
    task_names:
      - recall-error-envelope
      - avoid-cache-regression
      - reject-stale-config-path
      - rename-shipping-rate-refs
      - select-affected-tests
      - mechanical-header-bump
      - misleading-note-paginate
      - timezone-flake-gotcha
      - avoid-double-settlement
      - avoid-email-identity-regression
      - avoid-rate-window-regression
      - recall-cursor-contract
      - recall-retry-schedule
      - recall-tax-rounding
      - recall-webhook-signature

agents:
  - import_path: agents.agentify_claude:AgentifyClaudeAgent
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      profile: balanced
      max_budget_usd: 0.35
      max_turns: 16
  - name: claude-code
    model_name: anthropic/claude-haiku-4-5-20251001
    kwargs:
      max_budget_usd: 0.35
