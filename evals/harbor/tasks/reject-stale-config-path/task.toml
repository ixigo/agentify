# Harbor task manifest (Terminal-Bench 2.0 task format).
version = "1.0"

[metadata]
category = "stale-context-rejection"
tags = ["agentify", "context", "stale-context-rejection"]
difficulty = "easy"
description = "Bump a config value; a stale Agentify note points at a config path that no longer exists, and the arm must prefer repo reality plus the fresher migration note."

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
